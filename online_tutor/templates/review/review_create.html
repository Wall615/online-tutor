{% extends "base.html" %}
{% block title %}评价课程 — 师说{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card auth-card">
            <div class="card-body" style="padding: 2.25rem;">
                <h2>⭐ 评价课程</h2>
                <div style="background: var(--bg-warm); border-radius: var(--radius-md); padding: 1.25rem; margin-bottom: 1.5rem;">
                    <p style="margin-bottom: 0.5rem;"><strong>课程：</strong>{{ booking.course.title }}</p>
                    <p style="margin-bottom: 0.5rem;"><strong>教师：</strong>{{ booking.teacher_ref.username }}</p>
                    <p style="margin-bottom: 0;"><strong>上课时间：</strong>{{ booking.scheduled_time.strftime('%Y-%m-%d %H:%M') }}</p>
                </div>
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                    <div class="mb-4">
                        <label class="form-label">评分</label>
                        <div style="display: flex; gap: 0.75rem;">
                            {% for i in range(1, 6) %}
                            <label class="role-option" style="flex: 1; padding: 0.5rem; cursor: pointer;">
                                <input type="radio" name="rating" value="{{ i }}" {% if i == 5 %}checked{% endif %}>
                                <span style="font-size: 1rem;">
                                    {% for _ in range(i) %}★{% endfor %}
                                </span>
                            </label>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="comment" class="form-label">评论（可选）</label>
                        <textarea class="form-control" id="comment" name="comment" rows="3" maxlength="1000"
                                  placeholder="分享你的学习体验…"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">提交评价</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
