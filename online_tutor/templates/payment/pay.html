{% extends "base.html" %}
{% block title %}支付 — 师说{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card auth-card">
            <div class="card-body" style="padding: 2.25rem;">
                <h2>确认支付</h2>
                <div style="background: var(--bg-warm); border-radius: var(--radius-md); padding: 1.25rem; margin-bottom: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="color: var(--ink-muted); font-size: 0.85rem;">课程</span>
                        <strong style="font-size: 0.9rem;">{{ booking.course.title }}</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="color: var(--ink-muted); font-size: 0.85rem;">教师</span>
                        <span style="font-size: 0.9rem;">{{ booking.teacher_ref.username }}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="color: var(--ink-muted); font-size: 0.85rem;">上课时间</span>
                        <span style="font-size: 0.9rem;">{{ booking.scheduled_time.strftime('%Y-%m-%d %H:%M') }}</span>
                    </div>
                    <hr style="border-color: var(--border); margin: 0.75rem 0;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 700;">应付金额</span>
                        <span class="detail-price" style="font-size: 1.75rem;">¥{{ "%.2f"|format(payment.amount) }}</span>
                    </div>
                </div>
                <p style="text-align: center; color: var(--ink-muted); font-size: 0.78rem; margin-bottom: 1rem;">
                    * 模拟支付环境，点击即支付成功
                </p>
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="btn btn-success w-100 btn-lg">✓ 确认支付</button>
                </form>
                <a href="{{ url_for('booking.my_bookings') }}" class="btn btn-light w-100 mt-2">返回</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
